# .github/workflows/_setup.yml
on:
  workflow_call:
    inputs:
      run-command:
        required: true
        type: string
      needs-env:
        required: false
        type: boolean
        default: false

jobs:
  run:
    runs-on: ubuntu-latest
    environment: development
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: DeterminateSystems/flakehub-cache-action@v3
      - run: nix develop -c bun install --frozen-lockfile

      - run: nix develop -c bun run cf-typegen

      - run: nix develop -c ${{ inputs.run-command }}
