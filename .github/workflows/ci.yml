name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/bun-action@v1
      - run: bun install
      - run: bunx oxlint
      - run: bunx oxfmt
      - run: bunx turbo build
