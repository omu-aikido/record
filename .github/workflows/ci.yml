name: CI

permissions:
  contents: read

on:
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  format:
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - name: Setup Nix
        run: |
          echo "experimental-features = nix-command flakes" >> ~/.config/nix/nix.conf
          echo "sandbox = false" >> ~/.config/nix/nix.conf

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(nix run .#pnpm -- config get store-dir)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: nix run .#pnpm -- install --frozen-lockfile

      - name: Format
        run: nix run .#pnpm -- run format

  lint:
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - name: Setup Nix
        run: |
          echo "experimental-features = nix-command flakes" >> ~/.config/nix/nix.conf
          echo "sandbox = false" >> ~/.config/nix/nix.conf

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(nix run .#pnpm -- config get store-dir)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: nix run .#pnpm -- install --frozen-lockfile

      - name: Lint
        run: nix run .#pnpm -- run lint

  knip:
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - name: Setup Nix
        run: |
          echo "experimental-features = nix-command flakes" >> ~/.config/nix/nix.conf
          echo "sandbox = false" >> ~/.config/nix/nix.conf

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(nix run .#pnpm -- config get store-dir)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: nix run .#pnpm -- install --frozen-lockfile

      - name: Knip
        run: nix run .#pnpm -- run knip

  type-check:
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - name: Setup Nix
        run: |
          echo "experimental-features = nix-command flakes" >> ~/.config/nix/nix.conf
          echo "sandbox = false" >> ~/.config/nix/nix.conf

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(nix run .#pnpm -- config get store-dir)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: nix run .#pnpm -- install --frozen-lockfile

      - name: Generate Env File for Cloudflare Types
        run: |
          touch .env
          echo "VITE_CLERK_PUBLISHABLE_KEY=''" >> .env
          echo "CLERK_SECRET_KEY=''" >> .env
          echo "CLERK_FRONTEND_API_URL=''" >> .env
          echo "CLERK_WEBHOOK_SECRET=''" >> .env
          echo "TURSO_AUTH_TOKEN=''" >> .env
          echo "TURSO_DATABASE_URL=''" >> .env

      - name: Type Generation
        run: nix run .#pnpm -- run cf-typegen

      - name: Type Check
        run: nix run .#pnpm -- run type-check

  build:
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - name: Setup Nix
        run: |
          echo "experimental-features = nix-command flakes" >> ~/.config/nix/nix.conf
          echo "sandbox = false" >> ~/.config/nix/nix.conf

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(nix run .#pnpm -- config get store-dir)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: nix run .#pnpm -- install --frozen-lockfile

      - name: Build
        run: nix run .#pnpm -- run build-only

  test:
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - name: Setup Nix
        run: |
          echo "experimental-features = nix-command flakes" >> ~/.config/nix/nix.conf
          echo "sandbox = false" >> ~/.config/nix/nix.conf

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(nix run .#pnpm -- config get store-dir)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: nix run .#pnpm -- install --frozen-lockfile

      - name: Test
        run: nix run .#pnpm -- run test
