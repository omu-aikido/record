name: E2E Tests

permissions:
  contents: read

on:
  pull_request:
    types:
      - opened
      - synchronize
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    environment: development
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - id: changed
        run: |
          git diff HEAD~1 --name-only 2>/dev/null \
            | grep -qE '^(flake\.lock|bun\.lock|Dockerfile|nix\.conf|compose\.yaml)$' \
            && echo "rebuild=true" >> $GITHUB_OUTPUT \
            || echo "rebuild=false" >> $GITHUB_OUTPUT

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package.json') }}
          restore-keys: ${{ runner.os }}-playwright-

      - run: nix develop -c bun install --frozen-lockfile

      - run: nix develop -c bunx playwright install chromium --with-deps

      - if: steps.changed.outputs.rebuild == 'true'
        run: docker compose build

      - name: Run E2E tests
        timeout-minutes: 10
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_FRONTEND_API_URL: ${{ secrets.CLERK_FRONTEND_API_URL }}
          CLERK_WEBHOOK_SECRET: ${{ secrets.CLERK_WEBHOOK_SECRET }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: nix develop -c bun test:e2e

      - if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
