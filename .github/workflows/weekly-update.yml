name: Weekly Update and PR

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Create/update branch
        run: |
          git fetch origin
          if git ls-remote --exit-code --heads origin update-weekly; then
            git checkout update-weekly
            git pull --rebase origin update-weekly
          else
            git checkout -b update-weekly main
          fi

      - name: Update packages
        run: bun update -r --latest

      - name: Commit and push
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "Weekly update $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push origin update-weekly

  pr:
    runs-on: ubuntu-latest
    needs: update
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Create PR
        run: |
          {
            echo "Automated weekly package update"
            echo ""
            echo "## Outdated Packages"
            echo "\`\`\`"
            bun outdated -r 2>&1 || echo "No outdated packages"
            echo "\`\`\`"
          } > pr_body.md

          PR_EXISTS=$(gh pr list --head update-weekly --base main --json number --jq '.[0].number')

          if [ -z "$PR_EXISTS" ]; then
            gh pr create \
              --title "Weekly update $(date +'%Y-%m-%d')" \
              --body-file pr_body.md \
              --base main \
              --head update-weekly
          else
            echo "PR already exists: $PR_EXISTS. Updating the PR body."
            gh pr edit "$PR_EXISTS" --body-file pr_body.md
          fi
